<html lang="th">
<head>

    body {

      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      width: 90%;
      max-width: 500px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #cbd5e1;
      margin-bottom: 30px;
    }

    a button {
      padding: 15px 25px;
      border: none;
      border-radius: 12px;
      background: #3b82f6;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    a button:hover {
      background: #2563eb;
      transform: scale(1.05);
    }
  </style>

</head>
<body>
